# Server shutdown message (broadcast to players)
server-shutdown: "{prefix}&cThe server is shutting down. Please rejoin later."

# Player kick/ban disconnect reasons
kick-kick-message: "{prefix}&cYou have been kicked: {reason}"
ban-kick-message: "{prefix}&cYou have been banned: {reason}"
ban-disconnect: "{prefix}&cYou are banned from this server: {reason}"

# Reload command
reload-success: "{prefix}&aReloaded: &e{items}"
